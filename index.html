<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sewa Alat Outdoor & Pendakian - JB rent.id</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --whatsapp: #25d366;
            --whatsapp-dark: #128c7e;
            --bg: #f5f5f5;
            --card-bg: #ffffff;
            --text: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .logo-img {
            max-width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        header h1 { margin: 5px 0; color: var(--primary); font-size: 24px; }
        header p { margin: 5px 0 0 0; color: #555; font-size: 14px; font-style: italic; }

        .info-toko {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            background: #f1f8e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #444;
            border: 1px solid #dcedc8;
        }

        .info-item strong { color: var(--primary-dark); display: block; margin-bottom: 2px; }
        h3 { color: var(--primary-dark); border-left: 4px solid var(--primary); padding-left: 10px; margin-top: 25px; font-size: 18px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
        input[type="text"], input[type="tel"], input[type="number"], input[type="date"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }

        .grid-4 { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 15px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        th { background-color: var(--primary); color: white; }
        .input-qty { width: 80px !important; padding: 8px !important; text-align: center; }

        .btn-hitung { display: block; width: 100%; background-color: var(--primary); color: white; border: none; padding: 16px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 25px; }
        .btn-wa { display: block; width: 100%; background-color: var(--whatsapp); color: white; border: none; padding: 16px; font-size: 16px; font-weight: bold; border-radius: 6px; margin-top: 15px; text-align: center; text-decoration: none; }
        
        #nota { display: none; margin-top: 30px; padding: 15px; border: 2px dashed var(--primary); background-color: #f9fbf9; border-radius: 8px; }
        .nota-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .total-bayar { font-size: 16px; font-weight: bold; color: var(--primary-dark); border-top: 2px solid #ccc; padding-top: 10px; margin-top: 15px; }

        @media (min-width: 600px) {
            .info-toko, .grid-4 { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="https://raw.githubusercontent.com/h6578234-ui/jb-rent.id/main/Proyek%20(20260605023752).png" alt="Logo" class="logo-img">
        <h1>JB rent.id</h1>
        <p>Premium Outdoor & Hiking Gear Rentals</p>
    </header>

    <div class="info-toko">
        <div class="info-item"><strong>Owner:</strong> Alvin Ni'matul Maula</div>
        <div class="info-item"><strong>WhatsApp:</strong> 0821-3605-1309</div>
    </div>

    <form id="formSewa" onsubmit="hitungSewa(event)">
        <h3>1. Data Penyewa</h3>
        <div class="grid-4">
            <div class="form-group"><label>Nama Lengkap:</label><input type="text" id="nama" required></div>
            <div class="form-group"><label>Nomor HP/WA:</label><input type="tel" id="kontak" required></div>
            <div class="form-group"><label>Tgl Ambil:</label><input type="date" id="tglMulai" required></div>
            <div class="form-group"><label>Durasi (Hari):</label><input type="number" id="durasi" min="1" value="1" required></div>
        </div>
        <div class="grid-4" style="margin-top: 5px;">
            <div class="form-group">
                <label>Jaminan Identitas:</label>
                <select id="jenisIdentitas">
                    <option value="KTP">KTP Asli</option>
                    <option value="KK">Kartu Keluarga (KK)</option>
                </select>
            </div>
            <div class="form-group"><label>Nomor Identitas:</label><input type="text" id="nomorIdentitas" required></div>
        </div>

        <h3>2. Pilih Alat</h3>
        <div class="table-responsive">
            <table>
                <thead><tr><th>Nama Alat</th><th>Harga/Hari</th><th>Jumlah</th></tr></thead>
                <tbody id="daftarAlat"></tbody>
            </table>
        </div>
        <button type="submit" class="btn-hitung">Hitung Total & Buat Nota</button>
    </form>

    <div id="nota">
        <div class="nota-header"><strong>=== NOTA PENYEWAAN ===</strong></div>
        <div id="notaKonten"></div>
        <div class="total-bayar">TOTAL: <span id="notaTotal"></span></div>
        <button onclick="kirimWhatsApp()" class="btn-wa">Kirim ke WhatsApp Admin</button>
    </div>
</div>

<script>
    const katalogAlat = [
        { id: "t2", nama: "Tenda Kapasitas 2", harga: 25000 },
        { id: "t4", nama: "Tenda Kapasitas 4", harga: 35000 },
        { id: "c4", nama: "Carrier 4L", harga: 15000 },
        { id: "c6", nama: "Carrier 6L", harga: 20000 },
        { id: "sb", nama: "Sleeping Bag", harga: 8000 },
        { id: "tp", nama: "Tracking Pole", harga: 5000 },
        { id: "hp", nama: "Hidropack", harga: 10000 },
        { id: "dp", nama: "Daypack", harga: 12000 },
        { id: "jk", nama: "Jaket", harga: 15000 },
        { id: "sp", nama: "Sepatu", harga: 20000 },
        { id: "lt", nama: "Lampu Tenda", harga: 5000 },
        { id: "hl", nama: "Headlamp", harga: 5000 },
        { id: "mt", nama: "Matras", harga: 3000 },
        { id: "st", nama: "Sarung Tangan", harga: 3000 },
        { id: "ns", nama: "Nesting", harga: 10000 },
        { id: "km", nama: "Kompor", harga: 10000 },
        { id: "tp2", nama: "Topi", harga: 5000 }
    ];

    function tampilkanKatalog() {
        const tbody = document.getElementById("daftarAlat");
        katalogAlat.forEach(a => {
            tbody.innerHTML += `<tr><td>${a.nama}</td><td>Rp ${a.harga.toLocaleString()}</td><td><input type="number" class="input-qty" id="qty_${a.id}" value="0" min="0"></td></tr>`;
        });
    }

    function hitungSewa(e) {
        e.preventDefault();
        let total = 0;
        let html = `Nama: ${document.getElementById('nama').value}<br>Jaminan: ${document.getElementById('jenisIdentitas').value}<br><hr>`;
        
        katalogAlat.forEach(a => {
            let qty = document.getElementById(`qty_${a.id}`).value;
            if(qty > 0) {
                total += (a.harga * qty);
                html += `<div class="nota-row"><span>${a.nama} x ${qty}</span> <span>Rp ${(a.harga * qty).toLocaleString()}</span></div>`;
            }
        });
        
        document.getElementById("notaKonten").innerHTML = html;
        document.getElementById("notaTotal").innerText = "Rp " + (total * document.getElementById('durasi').value).toLocaleString();
        document.getElementById("nota").style.display = "block";
    }

    function kirimWhatsApp() {
        window.open("https://wa.me/6282136051309?text=Halo admin, saya ingin menyewa alat outdoor.");
    }

    window.onload = tampilkanKatalog;
    document.getElementById('tglMulai').valueAsDate = new Date();
</script>

</body>
</html>
